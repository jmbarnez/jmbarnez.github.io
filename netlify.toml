[build]
  # Build command for Vite - first generate runtime config.json from env, then build
  command = "node scripts/write-config.js && npm run build"
  # Directory to publish (Vite builds to 'dist' by default)
  publish = "dist"
  # Functions directory
  functions = "netlify/functions"

[build.environment]
  # Node.js version
  NODE_VERSION = "18"

[dev]
  command = "vite --host 0.0.0.0 --port 3000"
  targetPort = 3000
  port = 8889
  functions = "netlify/functions"
  autoLaunch = false

